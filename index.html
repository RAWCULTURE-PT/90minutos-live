function ChannelBadge({ channel }) {
  const isSTV = channel.includes('Sport TV');
  const isRTP = channel.startsWith('RTP');
  const isSIC = channel === 'SIC';
  const isTVI = channel === 'TVI';
  /* paleta suave: azul · verde · âmbar · lavanda */
  const style = isSTV ? {background:'#CDEBF1', color:'#1E6070', border:'1px solid #A8D8E4'}
              : isRTP ? {background:'#DEF1D0', color:'#2A5E38', border:'1px solid #BEE0AC'}
              : isSIC ? {background:'#F5E8D4', color:'#7A4A20', border:'1px solid #E8D0AC'}
              : isTVI ? {background:'#EAE2F0', color:'#5A3878', border:'1px solid #D4C8E8'}
              :          {background:'#EBEBEA', color:'#5D5D5A', border:'1px solid #D5D4D2'};
  return (
    <span style={style} className="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider whitespace-nowrap">
      {channel}
    </span>
  );
}

function getChannels(hc, ac) {
  if (_channelsData) {

const API_NAME = {

  'Brazil':'BRA','Morocco':'MAR','Haiti':'HAI','Scotland':'SCO','USA':'USA',

};

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
const isPT = m => m.hc === 'POR' || m.ac === 'POR';
const PT_DATES  = [...new Set(M.filter(isPT).map(x => x.d))];
const ALL_DATES = [...new Set(M.map(x => x.d))].sort((a,b) => parseInt(a)-parseInt(b));

const _now0    = new Date();
const _isJun26 = _now0.getFullYear() === 2026 && _now0.getMonth() === 5;
const TODAY    = _isJun26 ? String(_now0.getDate()) : '14';

// Datas visíveis no Mundial: a partir de hoje, máximo 7 dias
const _todayInt    = parseInt(TODAY);
const VISIBLE_DATES = ALL_DATES.filter(d => {
  const nd = parseInt(d);
  return nd >= _todayInt && nd <= _todayInt + 7;
});

function getStatus(m) {
  const now = new Date();
  const md  = parseInt(m.d);
  const td  = _isJun26 ? now.getDate() : 14;
  if (md < td) return 'done';
  if (md > td) return 'next';
  const [mh, mm] = m.t.split(':').map(Number);
  const start = mh * 60 + mm;
  const cur   = now.getHours() * 60 + now.getMinutes();
  if (cur < start)       return 'today';
  if (cur < start + 115) return 'live';
  return 'done';
}

const _DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function dayLabel(d) {
  const nd = parseInt(d), td = _todayInt;
  if (nd === td)     return 'Hoje';
  if (nd === td + 1) return 'Amanhã';
  const diaSemana = _DIAS[new Date(2026, 5, nd).getDay()];
  return `${diaSemana} · ${nd} Jun`;
}

function p2(n) { return String(n).padStart(2,'0'); }

/* ─────────────────────────────────────────────
   HELPERS DE SEMANA / MÊS
───────────────────────────────────────────── */
function getWeekMon(dayNum) {
  const d = new Date(2026, 5, dayNum);
  const dow = d.getDay(); // 0=Dom
  return dayNum - (dow === 0 ? 6 : dow - 1);
}
function weekLabel(ws) {
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago'];
  const s = new Date(2026, 5, ws);
  const e = new Date(2026, 5, ws + 6);
  const sm = meses[s.getMonth()], em = meses[e.getMonth()];
  return sm === em
    ? `${s.getDate()}-${e.getDate()} ${sm}`
    : `${s.getDate()} ${sm} - ${e.getDate()} ${em}`;
}
const WEEK_STARTS = [...new Set(ALL_DATES.map(d => getWeekMon(parseInt(d))))].sort((a,b) => a-b);
const ALL_MONTHS  = [{ key:'junho', label:'JUNHO, 2026' }];

/* ─────────────────────────────────────────────
   NOMES DAS EQUIPAS + CLASSIFICAÇÃO
───────────────────────────────────────────── */
const TEAM_NAMES = {};
M.forEach(m => { TEAM_NAMES[m.hc] = m.h; TEAM_NAMES[m.ac] = m.a; });

function computeStandings(grp, matchData) {
  const tcs  = Object.entries(GROUP).filter(([,g]) => g === grp).map(([tc]) => tc);
  const done = matchData.filter(m => GROUP[m.hc] === grp && m.hs !== undefined);
  return tcs.map(tc => {
    const played = done.filter(m => m.hc === tc || m.ac === tc);
    let pts=0,w=0,d=0,l=0,gf=0,ga=0;
    played.forEach(m => {
      const isH = m.hc === tc;
      const tg = isH ? m.hs : m.as, og = isH ? m.as : m.hs;
      gf+=tg; ga+=og;
      if(tg>og){pts+=3;w++;}else if(tg===og){pts+=1;d++;}else l++;
    });
    return {tc, name:TEAM_NAMES[tc]||tc, p:played.length, w, d, l, gf, ga, gd:gf-ga, pts};
  }).sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
}

/* ─────────────────────────────────────────────
   APP
───────────────────────────────────────────── */
function App() {
  const [tab,           setTab]           = useState('mundial');
  const [koFase,        setKoFase]        = useState('todos');
  const [activeDay,     setActiveDay]     = useState(TODAY);
  const [teamSearch,    setTeamSearch]    = useState('');
  const [compFilter,    setCompFilter]    = useState('ALL');
  const [channelFilter, setChannelFilter] = useState('ALL');
  const [sortBy,        setSortBy]        = useState('timeAsc');
  const [showLiveOnly,  setShowLiveOnly]  = useState(false);
  const [selected,      setSelected]      = useState(null);
  const [favorites,     setFavorites]     = useState([]);
  const [countdown,     setCountdown]     = useState(null);
  const [clock,         setClock]         = useState('');
  const [clockDate,     setClockDate]     = useState('');
  const [matchData,     setMatchData]     = useState(M);
  const [viewMode,      setViewMode]      = useState('day');
  const [activePeriod,  setActivePeriod]  = useState(null);
  const [teamView,      setTeamView]      = useState(null);
  const [shareMsg,      setShareMsg]      = useState('');
  const [, setChTick] = useState(0); // força re-render quando channels.json carrega

  /* Canais TV actualizados automaticamente pelo scraper diário */
  useEffect(() => {
    fetch('./channels.json?_=' + Date.now())
      .then(r => r.json())
      .then(data => { _channelsData = data.channels || null; setChTick(n => n + 1); })
      .catch(() => { /* sem channels.json: usa CH_MAP hardcoded */ });
  }, []);

  /* Relógio */
  useEffect(() => {
    const tick = () => {
      const n = new Date();
      setClock(p2(n.getHours()) + ':' + p2(n.getMinutes()));
      const dias  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
      const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
      setClockDate(`${dias[n.getDay()]}, ${n.getDate()} ${meses[n.getMonth()]}`);
    };
    tick();
    const t = setInterval(tick, 15000);
    return () => clearInterval(t);
  }, []);

  /* Contagem decrescente para o próximo jogo de Portugal */
  useEffect(() => {
    const next = matchData
      .filter(m => isPT(m) && getStatus(m) !== 'done')
      .sort((a,b) => parseInt(a.d) - parseInt(b.d))[0];
    if (!next) { setCountdown(null); return; }
    const [mh, mm] = next.t.split(':').map(Number);
    const target   = new Date(2026, 5, parseInt(next.d), mh, mm, 0);
    const update   = () => {
      const diff = target - new Date();
      if (diff <= 0) { setCountdown({ match: next, live: true }); return; }
      setCountdown({
        match: next,
        days : Math.floor(diff / 86400000),
        hours: Math.floor((diff % 86400000) / 3600000),
        mins : Math.floor((diff % 3600000)  / 60000),
        secs : Math.floor((diff % 60000)    / 1000),
      });
    };
    update();
    const t = setInterval(update, 1000);
    return () => clearInterval(t);
  }, [matchData]);

  /* Resultados em tempo real (openfootball) */
  useEffect(() => {
    const load = async () => {
      try {
        const r = await fetch('https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json', { cache: 'no-cache' });
        if (!r.ok) return;
        const data = await r.json();
        setMatchData(prev => {
          const next = [...prev]; let changed = false;
          (data.matches || []).forEach(am => {
            if (!am.score) return;
            const hc = API_NAME[am.team1], ac = API_NAME[am.team2];
            if (!hc || !ac) return;
            const idx = next.findIndex(m => m.hc === hc && m.ac === ac);
            if (idx < 0) return;
            next[idx] = { ...next[idx], hs: am.score.ft[0], as: am.score.ft[1] };
            changed = true;
          });
          return changed ? next : prev;
        });
      } catch (_) {}
    };
    load();
    const t = setInterval(load, 300000);
    return () => clearInterval(t);
  }, []);

  const [teamFilter,   setTeamFilter]   = useState('ALL');
  const [showFilters,  setShowFilters]  = useState(false);

  const toggleFav = team => setFavorites(p => p.includes(team) ? p.filter(t => t !== team) : [...p, team]);
  const isFav     = m   => favorites.includes(m.h) || favorites.includes(m.a);

  const isSearching   = teamSearch.trim().length > 0;
  const isTeamFiltered = teamFilter !== 'ALL';
  const showingAll    = isSearching || isTeamFiltered;
  const multiDate     = tab === 'portugal' || showingAll || viewMode !== 'day';
  const dates         = tab === 'portugal' ? PT_DATES : VISIBLE_DATES;

  const allTeams = useMemo(() =>
    [...new Set([...matchData.map(m => m.h), ...matchData.map(m => m.a)])].sort((a,b) => a.localeCompare(b, 'pt')),
  [matchData]);

  const matches = useMemo(() => {
    if (tab === 'liga') return [];
    let pool = tab === 'portugal' ? matchData.filter(isPT) : matchData;
    if (isTeamFiltered) {
      pool = matchData.filter(m => m.h === teamFilter || m.a === teamFilter);
    } else if (isSearching) {
      pool = matchData.filter(m =>
        (m.h + ' ' + m.a).toLowerCase().includes(teamSearch.trim().toLowerCase())
      );
    } else if (tab !== 'portugal') {
      if (viewMode === 'week') {
        pool = pool.filter(m => getWeekMon(parseInt(m.d)) === activePeriod);
      } else if (viewMode === 'month') {
        // por agora todos os dados são de junho — sem filtro adicional
      } else {
        pool = pool.filter(m => m.d === activeDay);
      }
    }
    return [...pool]
      .filter(m => compFilter    === 'ALL' || m.g === compFilter)
      .filter(m => channelFilter === 'ALL' || getChannels(m.hc, m.ac).some(c => c.toLowerCase().includes(channelFilter.toLowerCase())))
      .filter(m => !showLiveOnly || getStatus(m) === 'live')
      .sort((a, b) => {
        // Ordena por data quando mostramos múltiplas datas
        if (isTeamFiltered || tab === 'portugal' || viewMode !== 'day') {
          const dd = parseInt(a.d) - parseInt(b.d);
          if (dd !== 0) return dd;
        }
        if (isFav(a) && !isFav(b)) return -1;
        if (!isFav(a) && isFav(b)) return  1;
        return sortBy === 'timeDesc' ? b.t.localeCompare(a.t) : a.t.localeCompare(b.t);
      });
  }, [tab, activeDay, teamSearch, teamFilter, compFilter, channelFilter, sortBy, showLiveOnly, matchData, favorites, viewMode, activePeriod]);

  const hasLive  = matches.some(m => getStatus(m) === 'live');
  const allComps = useMemo(() => [...new Set(matchData.map(m => m.g))].sort(), [matchData]);

  const panelTitle = isTeamFiltered
    ? `TODOS OS JOGOS: ${teamFilter.toUpperCase()}`
    : isSearching    ? `RESULTADOS PARA "${teamSearch.toUpperCase()}"`
    : tab === 'portugal' ? 'JOGOS DE PORTUGAL'
    : tab === 'liga'     ? 'LIGA PORTUGAL 2026/27'
    : viewMode === 'week'  ? `SEMANA ${activePeriod != null ? weekLabel(activePeriod) : ''}`
    : viewMode === 'month' ? (ALL_MONTHS.find(m => m.key === activePeriod) || ALL_MONTHS[0]).label
    : activeDay === TODAY ? 'AGENDA DE HOJE'
    : `AGENDA - ${parseInt(activeDay)}, Jun`;

  const switchViewMode = mode => {
    setViewMode(mode);
    if (mode === 'week') {
      const ws = getWeekMon(_todayInt);
      setActivePeriod(WEEK_STARTS.includes(ws) ? ws : WEEK_STARTS[0]);
    } else if (mode === 'month') {
      setActivePeriod('junho');
    } else {
      setActivePeriod(null);
    }
  };

  const switchTab = k => {
    setTab(k); setTeamSearch(''); setTeamFilter('ALL'); setCompFilter('ALL'); setChannelFilter('ALL');
    setViewMode('day'); setActivePeriod(null);
    if (k === 'portugal') setActiveDay(PT_DATES.find(d => parseInt(d) >= _todayInt) || PT_DATES[0] || TODAY);
    else setActiveDay(TODAY);
  };

  /* ── RENDER ── */
  return (
    <div className="min-h-screen bg-[#F8F6F5] text-[#0f172a] px-4 py-8">
      <div className="max-w-[960px] mx-auto">

        {/* HEADER */}
        <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
          <div>
            <div className="font-bc text-[30px] font-[900] leading-none tracking-tight">
              90<span style={{color:'#00904A'}}>minutos</span>.live
            </div>
            <div className="text-[11px] font-semibold text-[#9AAABB] uppercase tracking-widest mt-1">
              Guia de Canais · Mundial 2026
            </div>
          </div>
          <div className="text-right">
            <div className="text-[22px] font-[800] leading-none tabular-nums">{clock}</div>
            <div className="text-[11px] text-[#9AAABB] mt-1">{clockDate}</div>
          </div>
        </header>

        {/* CONTAGEM PORTUGAL */}
        {countdown && !countdown.live && (
          <div className="mb-4 bg-white border border-[#e2e8f0] rounded-2xl shadow-sm p-4">
            <div className="flex items-center justify-between gap-3">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-1.5 mb-1">
                  <span style={{width:7,height:7,borderRadius:'50%',background:'#00904A',display:'inline-block'}} className="blink"></span>
                  <span className="text-[10px] font-bold uppercase tracking-widest" style={{color:'#00904A'}}>Próximo jogo de Portugal</span>
                </div>
                <div className="text-[16px] sm:text-[20px] font-[900] text-[#0f172a] leading-tight truncate">
                  {countdown.match.h} - {countdown.match.a}
                </div>
                <div className="text-[11px] text-[#64748b] mt-1 truncate">
                  {(() => { const {comp,round} = getCompLabel(countdown.match); return <span>{comp}{round && ` · ${round}`}</span>; })()}
                  {' · '}{parseInt(countdown.match.d)} Jun · {countdown.match.t}
                  {' · '}<span className="font-semibold">{getChannels(countdown.match.hc, countdown.match.ac).join(' + ')}</span>

        <div className="relative mb-4">

        {/* TABS */}

            { key:'mundial',       label:'Mundial 2026',  short:'Mundial',      count: matchData.length },
            { key:'portugal',      label:'Portugal',       short:'Portugal',     count: matchData.filter(isPT).length },

                  onClick={() => setShowLiveOnly(v => !v)}

                  className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border transition-all text-[11px] font-bold whitespace-nowrap"
                  style={showLiveOnly
                    ? {background:'#ef4444', color:'white', borderColor:'#ef4444'}

                  <span className="blink" style={{width:6,height:6,borderRadius:'50%',display:'inline-block',background: showLiveOnly ? 'white' : '#f87171', flexShrink:0}}></span>

                  return (
                    <button
                      onClick={() => setShowFilters(v => !v)}
                      className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border transition-all text-[11px] font-bold whitespace-nowrap"
                      style={active
                        ? {background:'#5B975B', color:'white', borderColor:'#5B975B'}
                        : {background:'white', color:'#64748b', borderColor:'#e2e8f0'}}>
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
                      <span className="hidden sm:inline">Filtros</span>
                      {n > 0 && (
                        <span className="inline-flex items-center justify-center w-4 h-4 rounded-full text-[9px] font-black"
                          style={{background:'rgba(255,255,255,0.25)', color:'white'}}>
                          {n}
                        </span>
                      )}
                    </button>
                  );
                })()}
              </div>
            </div>

            {/* Painel de filtros (colapsável) */}
            {showFilters && (
              <div className="mt-2 bg-white border border-[#e2e8f0] rounded-2xl p-4 shadow-sm grid grid-cols-1 sm:grid-cols-2 gap-3">
                {/* Equipa */}
                <div className="relative">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#94a3b8] pointer-events-none">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                  </span>
                  <select value={teamFilter} onChange={e => { setTeamFilter(e.target.value); setTeamSearch(''); }}
                    className="w-full pl-8 pr-7 py-2 text-[12px] bg-[#f8fafc] border rounded-xl outline-none cursor-pointer font-medium appearance-none"
                    style={{color: teamFilter !== 'ALL' ? '#2B7A8E' : '#0f172a', borderColor: teamFilter !== 'ALL' ? '#B5DCE8' : '#e2e8f0'}}>
                    <option value="ALL">Todas as equipas</option>
                    {allTeams.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                  <span className="absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none" style={{color: teamFilter !== 'ALL' ? '#2B7A8E' : '#94a3b8'}}><Ico.ChevronDown /></span>
                </div>
                {/* Canal */}
                <div className="relative">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#94a3b8] pointer-events-none"><Ico.Filter /></span>
                  <select value={channelFilter} onChange={e => setChannelFilter(e.target.value)}
                    className="w-full pl-8 pr-7 py-2 text-[12px] bg-[#f8fafc] border border-[#e2e8f0] rounded-xl outline-none cursor-pointer appearance-none"
                    style={{color:'#0f172a'}}>
                    <option value="ALL">Todos os canais</option>
                    <option value="Sport TV">Sport TV</option>
                    <option value="RTP">RTP</option>
                    <option value="SIC">SIC</option>
                    <option value="TVI">TVI</option>
                  </select>
                  <span className="absolute right-2.5 top-1/2 -translate-y-1/2 text-[#94a3b8] pointer-events-none"><Ico.ChevronDown /></span>
                </div>
                {/* Competição */}
                <div className="relative">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#94a3b8] pointer-events-none"><Ico.Filter /></span>
                  <select value={compFilter} onChange={e => setCompFilter(e.target.value)}
                    className="w-full pl-8 pr-7 py-2 text-[12px] bg-[#f8fafc] border border-[#e2e8f0] rounded-xl outline-none cursor-pointer appearance-none"
                    style={{color:'#0f172a'}}>
                    <option value="ALL">Todas as competições</option>
                    {allComps.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                  <span className="absolute right-2.5 top-1/2 -translate-y-1/2 text-[#94a3b8] pointer-events-none"><Ico.ChevronDown /></span>
                </div>
                {/* Ordem */}
                <div className="relative">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#94a3b8] pointer-events-none"><Ico.Sort /></span>
                  <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                    className="w-full pl-8 pr-7 py-2 text-[12px] bg-[#f8fafc] border border-[#e2e8f0] rounded-xl outline-none cursor-pointer appearance-none"
                    style={{color:'#0f172a'}}>
                    <option value="timeAsc">Mais cedo primeiro</option>
                    <option value="timeDesc">Mais tarde primeiro</option>
                  </select>
                  <span className="absolute right-2.5 top-1/2 -translate-y-1/2 text-[#94a3b8] pointer-events-none"><Ico.ChevronDown /></span>
                </div>
              </div>
            )}
          </div>
        )}

        {/* PAINEL */}
        {tab === 'eliminatorias' ? (
          <div className="anim">
            {/* Pills de fase */}
            <div className="flex gap-1.5 overflow-x-auto scrollbar-none mb-4 pb-0.5">
              {[
                {k:'todos',   l:'Todos'},
                {k:'16avos',  l:'16 Avos'},
                {k:'oitavos', l:'Oitavos'},
                {k:'quartos', l:'Quartos'},
                {k:'meias',   l:'Meias'},
                {k:'3lugar',  l:'3.º Lugar'},
                {k:'final',   l:'Final'},
              ].map(({k, l}) => (
                <button key={k} onClick={() => setKoFase(k)}
                  className="shrink-0 text-[12px] font-medium px-3.5 py-1.5 rounded-full border transition-all whitespace-nowrap"
                  style={koFase === k
                    ? {background:'#5B975B', color:'white', borderColor:'#5B975B'}
                    : {background:'white', color:'#536078', borderColor:'#e2e8f0'}}>
                  {l}
                </button>
              ))}
            </div>

            {/* Aviso equipas TBD */}
            <div className="mb-4 flex items-start gap-2.5 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3">
              <span className="text-amber-500 mt-0.5 shrink-0">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              </span>
              <p className="text-[12px] text-amber-700 leading-snug">
                As equipas são apuradas após a fase de grupos, que termina a <strong>28 de junho</strong>.
                Os canais são baseados em Sport TV — a Final passa também na <strong>RTP 1</strong>.
              </p>
            </div>

            {/* Tabela de jogos */}
            <div className="bg-white border border-[#e2e8f0] rounded-2xl shadow-sm overflow-hidden">

              {/* Cabeçalho tabela (desktop) */}
              <div className="hidden sm:grid grid-cols-[80px_72px_140px_1fr_150px] px-5 py-2.5 bg-[#f8fafc] border-b border-[#e2e8f0]">
                {['Data','Hora','Fase','Jogo','Canal TV'].map((h, i, arr) => (
                  <span key={h} className="text-[10px] font-bold uppercase tracking-wider text-[#9AAABB]"
                    style={i===arr.length-1?{textAlign:'right'}:{}}>
                    {h}
                  </span>
                ))}
              </div>

              {KNOCKOUT.filter(m => koFase === 'todos' || m.f === koFase).map((m, i) => (
                <div key={i}
                  className="grid grid-cols-[64px_1fr_auto] sm:grid-cols-[80px_72px_140px_1fr_150px] items-center gap-x-3 sm:gap-x-4 px-3 sm:px-5 py-3 sm:py-3.5 border-b border-[#f8fafc] last:border-0"
                  style={{background: m.f === 'final' ? '#f0fdf4' : 'transparent'}}
                >
                  {/* Data */}
                  <div>
                    <div className="text-[11px] font-[700] text-[#0f172a] leading-none">{m.d}</div>
                    {/* Hora só em mobile */}
                    <div className="sm:hidden text-[12px] font-[800] tabular-nums mt-1.5" style={{color:'#2B7A8E'}}>{m.t}</div>
                  </div>

                  {/* Hora — desktop */}
                  <div className="hidden sm:block text-[15px] font-[800] leading-none tabular-nums" style={{color:'#2B7A8E'}}>
                    {m.t}
                  </div>

                  {/* Fase */}
                  <div className="hidden sm:block pr-2">
                    <div className="text-[10px] font-bold text-[#64748b] uppercase tracking-wider leading-snug">
                      {KO_FASE_LABELS[m.f] || m.f}
                    </div>
                    <div className="text-[10px] font-semibold text-[#9AAABB] uppercase tracking-wider leading-snug mt-0.5">
                      {m.j}
                    </div>
                  </div>

                  {/* Jogo */}
                  <div className="min-w-0 pr-2">
                    <div className="text-[13px] sm:text-[14px] font-bold leading-snug" style={{color:'#0f172a'}}>
                      {m.vs}
                    </div>
                    <div className="flex items-center gap-1.5 mt-1 flex-wrap">
                      <span className="sm:hidden text-[10px] text-[#94a3b8]">{KO_FASE_LABELS[m.f]} · {m.j}</span>
                      {m.late && (
                        <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-slate-100 text-slate-500 border border-slate-200">
                          madrugada
                        </span>
                      )}
                    </div>
                  </div>

                  {/* Canal */}
                  <div className="flex flex-col items-end gap-1 shrink-0">
                    {m.chs.map(c => <ChannelBadge key={c} channel={c} />)}
                  </div>
                </div>
              ))}
            </div>
          </div>
        ) : tab === 'liga' ? (
          <div className="bg-white border border-[#e2e8f0] rounded-2xl shadow-sm p-12 text-center anim">
            <div className="inline-flex items-center gap-2 bg-amber-50 border border-amber-200 text-amber-700 text-[11px] font-bold uppercase tracking-wider px-4 py-1.5 rounded-full mb-6">
              🏆 FC Porto · Campeão 2025/26 · 31.º título
            </div>
            <h2 className="text-[26px] font-[900] text-[#0f172a] mb-2 tracking-tight">Liga Portugal 2026/27</h2>
            <p className="text-[14px] text-[#64748b] mb-8">
              A nova época começa em agosto.<br/>
              Os jogos e canais aparecem aqui assim que o calendário for publicado.
            </p>
            {(() => {
              const dias = Math.max(0, Math.ceil((new Date(2026,7,10) - new Date()) / 86400000));
              return (
                <div className="inline-flex items-center gap-3 bg-[#f8fafc] border border-[#e2e8f0] rounded-xl px-6 py-3">
                  <span className="text-[32px] font-[900] text-[#0f172a] leading-none tabular-nums">{dias}</span>
                  <span className="text-[12px] text-[#64748b] leading-snug text-left">dias para a<br/><strong>primeira jornada</strong></span>
                </div>
              );
            })()}
          </div>
        ) : (
          <div key={`${tab}-${activeDay}-${isSearching}`}
            className="bg-white border border-[#e2e8f0] rounded-2xl shadow-sm overflow-hidden anim">

            {/* Cabeçalho */}
            <div className="bg-[#f8fafc] px-5 py-4 border-b border-[#e2e8f0] flex items-center justify-between">
              <h2 className="text-[12px] font-bold text-[#0f172a] uppercase tracking-widest">{panelTitle}</h2>
              {hasLive && (
                <span className="text-[10px] font-bold uppercase px-3 py-1 rounded-full blink"
                  style={{background:'#ef4444',color:'white'}}>
                  EM DIRETO
                </span>
              )}
            </div>

            {/* Cabeçalho da tabela (desktop) */}
            <div className={`hidden sm:grid ${multiDate ? 'grid-cols-[90px_76px_160px_1fr_150px]' : 'grid-cols-[76px_160px_1fr_150px]'} px-5 py-2.5 border-b border-[#f1f5f9]`}>
              {(multiDate ? ['Data','Hora','Competição','Jogo','Canal TV'] : ['Hora','Competição','Jogo','Canal TV']).map((h, i, arr) => (
                <span key={h} className="text-[10px] font-bold uppercase tracking-wider text-[#9AAABB]"
                  style={i===arr.length-1?{textAlign:'right'}:{}}>
                  {h}
                </span>
              ))}
            </div>

            {/* Linhas */}
            {matches.length === 0 ? (
              <div className="py-16 text-center">
                <div style={{fontSize:48,marginBottom:12}}>⚽</div>
                <div className="font-semibold text-[#475569] mb-1">Sem jogos</div>
                <div className="text-[13px] text-[#94a3b8]">Escolhe outro dia ou altera os filtros.</div>
              </div>
            ) : matches.map((m, i) => {
              const s   = getStatus(m);
              const pt  = isPT(m);
              const chs = getChannels(m.hc, m.ac);
              const fav = isFav(m);
              const rowBg = s==='live' ? '#fff5f5' : pt ? '#f0fdf4' : 'transparent';
              return (
                <div key={i} onClick={() => { setSelected(m); setTeamView(null); }}
                  className={`grid ${multiDate ? 'grid-cols-[64px_1fr_auto] sm:grid-cols-[90px_76px_160px_1fr_150px]' : 'grid-cols-[56px_1fr_auto] sm:grid-cols-[76px_160px_1fr_150px]'} items-center gap-x-3 sm:gap-x-5 px-3 sm:px-4 py-3 sm:py-3.5 border-b border-[#f8fafc] last:border-0 cursor-pointer transition-colors`}
                  style={{background:rowBg}}
                  onMouseEnter={e => e.currentTarget.style.filter='brightness(.97)'}
                  onMouseLeave={e => e.currentTarget.style.filter=''}
                >
                  {/* Data + Hora (combinados em mobile, separados em desktop) */}
                  {multiDate && (
                    <div>
                      <div className="text-[11px] font-[700] text-[#0f172a] leading-none tabular-nums">{parseInt(m.d)} Jun</div>
                      <div className="text-[9px] text-[#9AAABB] mt-0.5">{_DIAS[new Date(2026, 5, parseInt(m.d)).getDay()]}</div>
                      {/* Hora só em mobile */}
                      <div className="sm:hidden text-[12px] font-[800] tabular-nums mt-1.5" style={{color: s==='done' ? '#b0bbcc' : '#2B7A8E'}}>{m.t}</div>
                    </div>
                  )}
                  {/* Hora — sempre em desktop, só aparece em mobile quando não é multiDate */}
                  <div className={`text-[15px] font-[800] leading-none tabular-nums${multiDate ? ' hidden sm:block' : ''}`}
                    style={{color: s==='done' ? '#b0bbcc' : '#2B7A8E'}}>
                    {m.t}
                  </div>

                  {/* Competição (desktop) */}
                  {(() => {
                    const { comp, round } = getCompLabel(m);
                    return (
                      <div className="hidden sm:block pr-2">
                        <div className="text-[10px] font-bold text-[#64748b] uppercase tracking-wider leading-snug">{comp}</div>
                        {round && <div className="text-[10px] font-semibold text-[#9AAABB] uppercase tracking-wider leading-snug mt-0.5">{round}</div>}
                      </div>
                    );
                  })()}

                  {/* Jogo */}
                  <div className="min-w-0 pr-2">
                    <div className="text-[13px] sm:text-[14px] font-bold leading-snug" style={{color: s==='done' ? '#475569' : '#0f172a'}}>
                      <button
                        onClick={e => { e.stopPropagation(); setSelected(m); setTeamView(m.hc); }}
                        className="hover:underline hover:opacity-70 transition-opacity">{m.h}</button>
                      <span style={{color:'#9AAABB',fontWeight:400}}> - </span>
                      <button
                        onClick={e => { e.stopPropagation(); setSelected(m); setTeamView(m.ac); }}
                        className="hover:underline hover:opacity-70 transition-opacity">{m.a}</button>
                    </div>
                    <div className="flex items-center gap-1.5 mt-1 flex-wrap">
                      {(() => {
                        const { comp, round } = getCompLabel(m);
                        const shortRound = round ? `Grupo ${round.split(' - ')[1] || ''}` : '';
                        return <span className="sm:hidden text-[10px] text-[#94a3b8]">{shortRound || comp}</span>;
                      })()}
                      {pt && (
                        <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-green-100 text-green-700 border border-green-200">
                          Portugal
                        </span>
                      )}
                      {s === 'live' && (
                        <span className="flex items-center gap-1 text-[10px] font-bold" style={{color:'#dc2626'}}>
                          <span className="blink" style={{width:6,height:6,borderRadius:'50%',background:'#dc2626',display:'inline-block'}}></span>
                          Ao vivo
                        </span>
                      )}
                    </div>
                  </div>

                  {/* Canal */}
                  <div className="flex flex-col items-end gap-1 shrink-0">
                    {chs.map(c => <ChannelBadge key={c} channel={c} />)}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* CARD HOJE + PARTILHA */}
        {(() => {
          const todayMs   = matchData.filter(m => m.d === TODAY);
          const liveM     = todayMs.find(m => getStatus(m) === 'live');
          const nextM     = !liveM && todayMs.filter(m => getStatus(m) === 'today').sort((a,b) => a.t.localeCompare(b.t))[0];
          const doneAll   = todayMs.length > 0 && todayMs.every(m => getStatus(m) === 'done');
          const noGames   = todayMs.length === 0;
          const handleShare = () => {
            const url  = 'https://90minutos.live';
            const text = 'Descobre em que canal passam os jogos do Mundial 2026 e da Liga Portugal';
            if (navigator.share) {
              navigator.share({ title: '90minutos.live', text, url }).catch(() => {});
            } else {
              navigator.clipboard.writeText(url).then(() => {
                setShareMsg('Link copiado!');
                setTimeout(() => setShareMsg(''), 2000);
              });
            }
          };
          return (
            <div className="mt-5 bg-white border border-[#e2e8f0] rounded-2xl p-4 sm:p-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-sm">
              <div>
                {noGames ? (
                  <>
                    <div className="font-semibold text-[14px] text-[#0f172a] mb-0.5">Sem jogos hoje</div>
                    <div className="text-[13px] text-[#64748b]">Consulta os próximos dias no calendário acima.</div>
                  </>
                ) : doneAll ? (
                  <>
                    <div className="font-semibold text-[14px] text-[#0f172a] mb-0.5">Jogos de hoje terminados</div>
                    <div className="text-[13px] text-[#64748b]">{todayMs.length} {todayMs.length === 1 ? 'jogo' : 'jogos'} disputados hoje.</div>
                  </>
                ) : liveM ? (
                  <>
                    <div className="font-semibold text-[14px] text-[#0f172a] mb-0.5 flex items-center gap-1.5">
                      <span style={{width:7,height:7,borderRadius:'50%',background:'#dc2626',display:'inline-block',animation:'blink 1s step-start infinite'}}></span>
                      Em direto agora
                    </div>
                    <div className="text-[13px] text-[#64748b]">
                      {liveM.h} - {liveM.a} · {getChannels(liveM.hc, liveM.ac)[0]}
                    </div>
                  </>
                ) : nextM ? (
                  <>
                    <div className="font-semibold text-[14px] text-[#0f172a] mb-0.5">
                      Hoje há {todayMs.length} {todayMs.length === 1 ? 'jogo' : 'jogos'}
                    </div>
                    <div className="text-[13px] text-[#64748b]">
                      Próximo às {nextM.t} · {nextM.h} - {nextM.a} · {getChannels(nextM.hc, nextM.ac)[0]}
                    </div>
                  </>
                ) : null}
              </div>
              <button
                onClick={handleShare}
                className="shrink-0 flex items-center gap-2 text-[13px] font-semibold px-5 py-2.5 rounded-xl border border-[#e2e8f0] text-[#0f172a] bg-white hover:bg-[#f8fafc] transition-colors whitespace-nowrap"
              >
                {shareMsg ? (
                  <>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    {shareMsg}
                  </>
                ) : (
                  <>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                    Partilhar
                  </>
                )}
              </button>
            </div>
          );
        })()}

        {/* FOOTER */}
        <footer className="mt-8 pt-5 border-t border-[#e2e8f0] flex flex-col sm:flex-row justify-between items-center gap-2 text-[11px] text-[#9AAABB] uppercase tracking-wider">
          <div className="flex items-center gap-2">
            <Ico.Calendar />
            WET · Lisboa · UTC+1
          </div>
          <div>90minutos.live · não afiliado com a FIFA nem com nenhum canal de televisão</div>
        </footer>

      </div>

      {/* MODAL */}
      {selected && (() => {
        const m   = selected;
        const s   = getStatus(m);
        const pt  = isPT(m);
        const chs = getChannels(m.hc, m.ac);
        const { comp, round } = getCompLabel(m);

        const closeModal = () => { setSelected(null); setTeamView(null); };

        const TeamPanel = ({ tc }) => {
          const grp      = GROUP[tc];
          const tName    = TEAM_NAMES[tc] || tc;
          const standings = grp ? computeStandings(grp, matchData) : [];
          const allTM    = matchData
            .filter(mm => mm.hc === tc || mm.ac === tc)
            .sort((a,b) => parseInt(a.d)-parseInt(b.d));
          const past     = allTM.filter(mm => getStatus(mm) === 'done');
          const upcoming = allTM.filter(mm => getStatus(mm) !== 'done');
          const lbl      = txt => (
            <div className="text-[10px] font-bold uppercase tracking-wider text-[#64748b] mb-2 mt-4 first:mt-0">{txt}</div>
          );
          return (
            <div>
              {/* Cabeçalho do painel */}
              <div className="flex items-center gap-3 px-5 pt-4 pb-3 border-b border-[#f1f5f9]">
                <button onClick={() => setTeamView(null)}
                  className="text-[11px] font-bold text-[#94a3b8] hover:text-[#0f172a] transition-colors shrink-0">
                  ← Voltar
                </button>
                <div className="flex-1 min-w-0">
                  <div className="text-[18px] font-[900] text-[#0f172a] leading-tight truncate">{tName}</div>
                  {grp && <div className="text-[10px] font-bold text-[#9AAABB] uppercase tracking-wider">Grupo {grp}</div>}
                </div>
                <button onClick={closeModal}
                  className="p-1.5 rounded-full text-[#94a3b8] hover:bg-black/5 transition-colors shrink-0">
                  <Ico.X size={16} />
                </button>
              </div>

              {/* Corpo com scroll */}
              <div className="px-5 py-4 max-h-[65vh] overflow-y-auto space-y-1">

                {/* Classificação */}
                {standings.length > 0 && (
                  <div>
                    {lbl(`Classificação · Grupo ${grp}`)}
                    <div className="rounded-xl border border-[#f1f5f9] overflow-hidden">
                      <div className="grid grid-cols-[16px_1fr_22px_22px_22px_22px_32px] px-3 py-1.5 bg-[#f8fafc] text-[9px] font-bold uppercase tracking-wider text-[#94a3b8]">
                        <span>#</span><span>Equipa</span>
                        <span className="text-center">J</span><span className="text-center">V</span>
                        <span className="text-center">E</span><span className="text-center">D</span>
                        <span className="text-center">Pts</span>
                      </div>
                      {standings.map((t, i) => (
                        <div key={t.tc}
                          className="grid grid-cols-[16px_1fr_22px_22px_22px_22px_32px] items-center px-3 py-2 text-[12px] border-t border-[#f8fafc]"
                          style={{background: t.tc === tc ? '#E8F4F7' : 'white'}}>
                          <span className="text-[#94a3b8] font-semibold">{i+1}</span>
                          <span className="font-semibold truncate" style={{color: t.tc === tc ? '#2B7A8E' : '#0f172a'}}>{t.name}</span>
                          <span className="text-center text-[#64748b]">{t.p}</span>
                          <span className="text-center text-[#64748b]">{t.w}</span>
                          <span className="text-center text-[#64748b]">{t.d}</span>
                          <span className="text-center text-[#64748b]">{t.l}</span>
                          <span className="text-center font-bold" style={{color: t.tc === tc ? '#2B7A8E' : '#0f172a'}}>{t.pts}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Resultados */}
                {past.length > 0 && (
                  <div>
                    {lbl('Resultados')}
                    <div className="rounded-xl border border-[#f1f5f9] overflow-hidden">
                      {past.map((mm, i) => {
                        const isH = mm.hc === tc;
                        return (
                          <div key={i} className="flex items-center justify-between px-3 py-2.5 text-[12px] border-t border-[#f8fafc] first:border-0" style={{background:'white'}}>
                            <span className="text-[#94a3b8] shrink-0 w-12">{parseInt(mm.d)} Jun</span>
                            <span className="flex-1 text-center font-semibold text-[#0f172a]">{mm.h}</span>
                            <span className="font-[900] px-2 tabular-nums text-[#0f172a]">{mm.hs} – {mm.as}</span>
                            <span className="flex-1 text-center font-semibold text-[#0f172a]">{mm.a}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Próximos jogos */}
                {upcoming.length > 0 && (
                  <div>
                    {lbl('Próximos Jogos')}
                    <div className="rounded-xl border border-[#f1f5f9] overflow-hidden">
                      {upcoming.map((mm, i) => (
                        <div key={i} className="flex items-center justify-between px-3 py-2.5 border-t border-[#f8fafc] first:border-0" style={{background:'white'}}>
                          <div className="min-w-0">
                            <div className="text-[12px] font-semibold text-[#0f172a]">{mm.h} - {mm.a}</div>
                            <div className="text-[10px] text-[#94a3b8]">{parseInt(mm.d)} Jun · {mm.t}</div>
                          </div>
                          <div className="flex flex-col items-end gap-1 ml-2 shrink-0">
                            {getChannels(mm.hc, mm.ac).map(c => <ChannelBadge key={c} channel={c} />)}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {past.length === 0 && upcoming.length === 0 && (
                  <div className="py-6 text-center text-[13px] text-[#94a3b8]">Sem jogos registados.</div>
                )}
              </div>
            </div>
          );
        };

        return (
          <>
            <div className="fixed inset-0 z-40"
              style={{background:'rgba(0,0,0,.4)',backdropFilter:'blur(4px)'}}
              onClick={closeModal}
            />
            <div className="fixed z-50 w-full modal-anim"
              style={{top:'50%',left:'50%',transform:'translate(-50%,-50%)',maxWidth:480,width:'calc(100% - 32px)'}}>
              <div className="bg-white border border-[#e2e8f0] rounded-2xl shadow-2xl overflow-hidden">

                {teamView ? <TeamPanel tc={teamView} /> : (
                  <>
                    {/* Cabeçalho do match */}
                    <div className="px-6 pt-5 pb-4"
                      style={{background: pt ? '#f0fdf4' : s==='live' ? '#fff5f5' : '#f8fafc'}}>
                      <div className="flex justify-between items-start mb-2">
                        <div className="text-[10px] font-bold uppercase tracking-widest" style={{color:'#2B7A8E'}}>
                          {comp}{round && ` · ${round}`} · {parseInt(m.d)} de junho · {m.t}
                        </div>
                        <button onClick={closeModal}
                          className="p-1.5 -mt-1 -mr-1 rounded-full text-[#94a3b8] hover:bg-black/5 transition-colors">
                          <Ico.X size={16} />
                        </button>
                      </div>
                      <div className="flex flex-wrap items-center gap-2 mb-2">
                        <button onClick={() => setTeamView(m.hc)}
                          className="text-[20px] font-[900] tracking-tight hover:opacity-60 transition-opacity text-[#0f172a]">
                          {m.h}
                        </button>
                        <span className="text-[16px] font-bold" style={{color:'#9AAABB'}}>-</span>
                        <button onClick={() => setTeamView(m.ac)}
                          className="text-[20px] font-[900] tracking-tight hover:opacity-60 transition-opacity text-[#0f172a]">
                          {m.a}
                        </button>
                      </div>
                      <div className="flex flex-wrap gap-1.5">
                        {pt && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700 border border-green-200">Jogo de Portugal</span>}
                        {s === 'live' && <span className="flex items-center gap-1 text-[10px] font-bold" style={{color:'#dc2626'}}>
                          <span className="blink" style={{width:6,height:6,borderRadius:'50%',background:'#dc2626',display:'inline-block'}}></span>
                          A decorrer
                        </span>}
                        {m.late && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-amber-50 text-amber-700 border border-amber-200">🌙 Madrugada</span>}
                      </div>
                    </div>

                    {/* Corpo do match */}
                    <div className="px-6 py-5 space-y-4">
                      {s === 'done' && m.hs !== undefined && (
                        <div className="flex justify-between items-center bg-[#f8fafc] rounded-xl px-4 py-3">
                          <span className="text-[11px] font-bold uppercase tracking-wider text-[#94a3b8]">Resultado Final</span>
                          <span className="text-[22px] font-[900] text-[#0f172a] tabular-nums">{m.hs} – {m.as}</span>
                        </div>
                      )}
                      <div className="flex justify-between items-center">
                        <span className="text-[11px] font-semibold uppercase tracking-wider text-[#94a3b8]">Data &amp; Hora</span>
                        <span className="text-[13px] font-semibold text-[#0f172a]">{parseInt(m.d)} de junho, {m.t}</span>
                      </div>
                      <div className="flex justify-between items-start">
                        <span className="text-[11px] font-semibold uppercase tracking-wider text-[#94a3b8] mt-0.5">Canal TV</span>
                        <div className="flex flex-col items-end gap-1.5">
                          {chs.map(c => <ChannelBadge key={c} channel={c} />)}
                        </div>
                      </div>
                      <div className="border-t border-[#f1f5f9] pt-3 text-[11px] text-[#94a3b8] text-center">
                        Clica no nome de uma equipa para ver a classificação e os jogos ↑
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
          </>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
