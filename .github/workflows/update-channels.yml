name: Actualizar Canais TV + Resultados

on:
  schedule:
    - cron: '0 */2 * * *'   # de 2 em 2 horas (UTC), durante o Mundial
  workflow_dispatch:          # permite correr manualmente no GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Correr scraper
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scraper/update_channels.py

      - name: Commit e push se algo mudou
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json results.json standings.json
          if git diff --staged --quiet; then
            echo "Sem alterações — nada a fazer."
          else
            git commit -m "🤖 dados actualizados $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
