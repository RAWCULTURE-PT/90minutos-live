name: Actualizar Canais TV

on:
  schedule:
    - cron: '0 7 * * *'    # 08:00 Lisboa (UTC+1, horário de verão)
    - cron: '0 13 * * *'   # 14:00 Lisboa
  workflow_dispatch:        # permite correr manualmente no GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # necessário para fazer push ao repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Correr scraper
        run: python scraper/update_channels.py

      - name: Commit e push se channels.json mudou
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json
          if git diff --staged --quiet; then
            echo "channels.json sem alterações — nada a fazer."
          else
            git commit -m "🤖 canais TV actualizados $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
